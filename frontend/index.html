        body {
            font-family: 'Inter', sans-serif;

        }
        /* Royal Blue Theme */
        .rca-blue-bg { background-color: #252968; }
        .rca-blue-text { color: #252968; }
        .rca-blue-border { border-color: #252968; }
        
        /* Gold Theme */
        .rca-gold-bg { background-color: #f2ad3f; }
        .rca-gold-text { color: #f2ad3f; }
        .rca-gold-border { border-color: #f2ad3f; }

        .glass-morphism {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        /* Overriding the previous generic classes to match RCA branding */
        .cricket-green { background-color: #252968; }
        .cricket-gold { color: #f2ad3f; }
